name: vidflix_flutter_app
description: "A new Flutter project."
publish_to: "none" # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ">=3.4.1 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6
  get: ^4.6.6
  flutter_localizations:
    sdk: flutter
  flutter_dotenv: ^5.1.0
  http: ^1.2.1
  dio: ^5.4.3+1
  shared_preferences: ^2.2.3
  shimmer: ^3.0.0
  flutter_svg: ^2.0.17
  flutter_screenutil: ^5.9.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - .env
    - .env.dev
    - .env.example
    - assets/images/
    - assets/svgs/

